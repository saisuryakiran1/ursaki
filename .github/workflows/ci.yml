name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci || npm install
      - name: ESLint (mobile)
        run: cd apps/mobile && npm run lint || true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Ruff
        run: pip install ruff && ruff check backend/src backend/tests

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci || npm install
      - run: npm run typecheck || true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: mypy
        run: |
          pip install poetry
          cd backend && poetry install && poetry run mypy src/ursaki || true

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install poetry
          cd backend && poetry install
      - name: pytest with coverage
        run: |
          cd backend && poetry run pytest --cov=ursaki --cov-report=term-missing --cov-fail-under=50

  test-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci || npm install
      - run: cd apps/mobile && npm test || true

  safety-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Safety tests (blocking)
        run: |
          pip install poetry
          cd backend && poetry install
          cd backend && poetry run pytest tests/test_safety_guard.py tests/test_engine.py -v --tb=short
