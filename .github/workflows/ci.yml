name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: ESLint (mobile)
        run: cd apps/mobile && npm run lint || true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Ruff
        run: pip install "ruff>=0.8.4" && ruff check backend/src backend/tests && ruff format --check backend/src backend/tests

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run typecheck || true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: mypy
        working-directory: backend
        run: |
          pip install poetry
          poetry install
          poetry run mypy src/ursaki || true

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: pytest with coverage
        working-directory: backend
        run: pytest --cov=ursaki --cov-report=term-missing --cov-fail-under=50

  test-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: cd apps/mobile && npm test

  safety-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Safety tests (blocking)
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pytest tests/test_safety_guard.py tests/test_engine.py -v --tb=short
